<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>محلل البلاغات الذكي</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap');
        body {
            font-family: 'Tajawal', sans-serif;
            background-color: #0b0f19;
        }
    </style>
</head>
<body class="flex justify-center items-center min-h-screen p-4 text-white">

    <div class="w-full max-w-md bg-[#111625] rounded-3xl p-6 border border-gray-800 shadow-2xl relative">
        
        <div class="flex justify-between items-center mb-6">
            <span class="text-xs text-gray-500 font-mono">an811-dot.github.io</span>
            <button class="text-[#00e676] text-2xl focus:outline-none">
                <i class="fa-solid fa-bars"></i>
            </button>
        </div>

        <div class="flex justify-center mb-6">
            <div class="bg-[#052e16] text-[#00e676] text-xs font-medium px-4 py-2 rounded-full border border-[#14532d] flex items-center gap-2">
                <i class="fa-solid fa-robot"></i>
                <span>نظام المطور أبو زايد المدعوم بـ AI</span>
            </div>
        </div>

        <div class="text-center mb-6">
            <h1 class="text-xl font-bold mb-2">محلل البلاغات الذكي المتقدم</h1>
            <p class="text-xs text-gray-400 leading-relaxed px-4">
                تحليل وفحص معمق للحسابات والمحتوى لاستخراج الانتهاكات وتوجيه بلاغات الإغلاق الفورية.
            </p>
        </div>

        <div class="space-y-4 mb-5">
            <div class="relative">
                <select class="w-full bg-[#0b0f19] border border-gray-800 rounded-xl px-4 py-3.5 text-sm appearance-none focus:outline-none focus:border-gray-700 text-center text-gray-300 cursor-pointer">
                    <option>منصة الإنستقرام (Instagram)</option>
                </select>
                <div class="absolute inset-y-0 left-4 flex items-center pointer-events-none text-gray-500 text-xs">
                    <i class="fa-solid fa-chevron-down"></i>
                </div>
            </div>

            <div class="relative">
                <input type="text" value="Q5.mc" class="w-full bg-[#0b0f19] border border-gray-800 rounded-xl px-4 py-3.5 text-sm text-center font-mono focus:outline-none focus:border-gray-700 text-white">
                <div class="absolute inset-y-0 right-4 flex items-center pointer-events-none text-gray-500 font-mono text-sm">
                    @
                </div>
            </div>

            <div class="relative">
                <select class="w-full bg-[#0b0f19] border border-gray-800 rounded-xl px-4 py-3.5 text-sm appearance-none focus:outline-none focus:border-gray-700 text-center text-gray-300 cursor-pointer">
                    <option>سبام، إزعاج ونشاطات وهمية</option>
                </select>
                <div class="absolute inset-y-0 left-4 flex items-center pointer-events-none text-gray-500 text-xs">
                    <i class="fa-solid fa-chevron-down"></i>
                </div>
            </div>
        </div>

        <button class="w-full bg-[#00e676] hover:bg-[#00c853] text-black font-bold py-4 rounded-xl mb-6 transition duration-200 text-sm shadow-lg shadow-[#00e676]/10">
            تشغيل نظام الـ AI المطور
        </button>

        <div class="bg-[#161c2e] rounded-2xl p-6 border border-gray-800 text-center">
            <div class="flex justify-center mb-4">
                <div class="w-16 h-16 bg-[#1f293d] rounded-full flex items-center justify-center text-[#e1306c] text-2xl shadow-inner">
                    <i class="fa-brands fa-instagram"></i>
                </div>
            </div>

            <h3 class="text-lg font-bold mb-2 font-mono dir-ltr">@Q5.mc <span class="font-sans text-sm font-normal text-gray-400">(انستقرام)</span></h3>
            
            <p class="text-[11px] text-gray-400 leading-normal mb-5 px-2">
                تم فحص: الملف الشخصي ▪ المحتوى المكتوب ▪ القصص والوسائط النشطة
            </p>

            <div class="flex justify-center">
                <button class="border border-red-500/40 text-red-400 bg-red-500/5 hover:bg-red-500/10 px-5 py-2 rounded-full text-xs font-medium flex items-center gap-2 transition duration-200">
                    <i class="fa-solid fa-list-check"></i>
                    <span>تم ترتيب تقرير الانتهاك بنجاح</span>
                </button>
            </div>
        </div>

        <div class="flex justify-center items-center gap-2 mt-5 text-gray-400 text-xs cursor-pointer hover:text-white transition">
            <span>تفاصيل التقرير الأمني الصادر:</span>
            <i class="fa-solid fa-shield-halved"></i>
        </div>

    </div>

</body>
</html>
