<!-- كرت هندسة الإنستقرام المطور -->
<div class="card" style="border: 1px solid #00ff6644; box-shadow: 0 0 25px rgba(0, 255, 102, 0.08);">
    <div class="badge-ai" style="color: #E1306C; border-color: rgba(225, 48, 108, 0.2); background: rgba(225, 48, 108, 0.05);">
        <i class="fa-brands fa-instagram"></i> وحدة عمليات الإنستقرام (Instagram Engine)
    </div>

    <h1>المحلل الأمني لحسابات الإنستقرام</h1>
    <p class="subtitle">استخراج الثغرات، كشف هوية الحساب، وتوجيه بلاغات الإغلاق المباشرة بدقة 98%.</p>

    <!-- تحديد الجنس -->
    <div class="gender-container" style="border: 1px solid #1a2332;">
        <label class="gender-label">
            <input type="radio" name="gender" value="male" checked>
            <span><i class="fa-solid fa-mars" style="color: #00bcff;"></i> ذكر</span>
        </label>
        <label class="gender-label">
            <input type="radio" name="gender" value="female">
            <span><i class="fa-solid fa-venus" style="color: #ff66b2;"></i> أنثى</span>
        </label>
    </div>

    <!-- حقل اليوزر -->
    <div class="input-user-wrapper">
        <input type="text" id="targetUser" placeholder="يوزر الحساب المستهدف (بدون @)..." style="padding-left: 35px; border-color: #334155;">
    </div>

    <!-- قائمة الثغرات المتخصصة -->
    <div class="select-wrapper">
        <select id="instaViolation">
            <option value="سبام_مكثف">ثغرة السبام المكثف (Spam Strike)</option>
            <option value="انتحال_شخصية">ثغرة انتحال الشخصية (Impersonation)</option>
            <option value="محتوى_جنسي">ثغرة المحتوى الصريح (Nudity/Sexual)</option>
            <option value="إساءة_تنمر">ثغرة الإساءة والتنمر (Bullying)</option>
        </select>
    </div>

    <!-- زر تنفيذ الإغلاق -->
    <button class="btn-submit" style="background-color: #E1306C; color: white; margin-top: 5px;" onclick="runInstaOperation()">
        <i class="fa-solid fa-skull-crossbones"></i> تفعيل هجوم الإغلاق فوراً
    </button>
    
    <!-- مؤشر الأداء -->
    <div id="instaResult" class="result-box" style="display: none; border-color: #E1306C44;">
        <p style="color: #E1306C; font-weight: bold; margin-bottom: 5px;"><i class="fa-solid fa-radar"></i> جاري اختراق جدار حماية إنستقرام...</p>
        <p id="instaStatus" style="font-size: 12px;"></p>
    </div>
</div>

<script>
    function runInstaOperation() {
        const user = document.getElementById('targetUser').value;
        const resultBox = document.getElementById('instaResult');
        const status = document.getElementById('instaStatus');
        
        if(user === "") { alert("يجب إدخال اليوزر أولاً!"); return; }
        
        resultBox.style.display = 'block';
        status.innerText = `جاري استهداف الحساب: @${user}... تطبيق بروتوكول الثغرة المختارة... تم إرسال 5 بلاغات حية!`;
        
        // هنا يمكنك إضافة كود الربط بالـ API أو السيرفر الخاص بك
    }
</script>
