<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Matrix Report System</title>
    <style>
        body { background-color: #0b0b12; color: #ffffff; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; overflow-x: hidden; }
        .container { width: 100%; max-width: 460px; background: #12121a; border: 1px solid #1f1f2e; border-radius: 20px; padding: 20px; box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5); position: relative; margin-bottom: 25px; box-sizing: border-box; }
        .menu-btn { position: absolute; top: 25px; right: 25px; cursor: pointer; display: flex; flex-direction: column; justify-content: space-between; width: 25px; height: 16px; z-index: 1001; }
        .menu-btn .line { height: 2px; width: 100%; background-color: #00ff66; border-radius: 2px; box-shadow: 0 0 8px #00ff66; }
        .sidebar { position: fixed; top: 0; right: -280px; width: 250px; height: 100%; background: #09090f; border-left: 2px solid #00ff66; z-index: 1000; padding: 20px; transition: 0.4s; }
        .sidebar.open { right: 0; }
        .contact-channels a { display: block; color: #fff; text-decoration: none; background: #161622; padding: 12px; margin-bottom: 10px; border-radius: 8px; text-align: center; border: 1px solid #1f1f30; font-weight: bold; }
        .contact-channels a:hover { border-color: #00ff66; color: #00ff66; }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 999; display: none; }
        .input-field, .select-field { width: 100%; padding: 12px; background: #161622; border: 1px solid #1f1f30; border-radius: 10px; color: #fff; margin-bottom: 12px; text-align: center; }
        .btn-ai-submit { width: 100%; padding: 14px; background: #00ff66; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; }
        .country-card { background: #161622; border: 1px solid #1f1f30; border-radius: 10px; padding: 12px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
        .flag-icon { font-size: 20px; margin-left: 10px; }
        .activation-btn { background: rgba(0, 255, 102, 0.1); border: 1px solid #00ff66; color: #00ff66; padding: 5px 10px; border-radius: 6px; font-size: 11px; cursor: pointer; }
    </style>
</head>
<body>

<div class="overlay" id="menuOverlay" onclick="toggleSidebar()"></div>

<div class="sidebar" id="sidebarMenu">
    <h4 style="color:#00ff66; text-align:center; margin-top:40px;">💬 منصات التواصل</h4>
    <div class="contact-channels">
        <a href="https://wa.me/966548459464" target="_blank">واتساب (أبو زايد)</a>
        <a href="https://instagram.com/5q.mc" target="_blank">Instagram</a>
        <a href="https://t.me/B_1n2" target="_blank">Telegram</a>
    </div>
</div>

<div class="container">
    <div class="menu-btn" onclick="toggleSidebar()">
        <div class="line"></div><div class="line"></div><div class="line"></div>
    </div>
    <h2 style="text-align:center; color:#00ff66;">نظام أبو زايد المطور</h2>
    <input type="text" class="input-field" placeholder="يوزر الحساب المستهدف...">
    <button class="btn-ai-submit" onclick="alert('جاري تحليل الحساب...')">تشغيل النظام</button>
</div>

<div class="container" id="cloudNumbersBox">
    <h3 style="text-align:center; color:#00ccff;">بوابة الأرقام السحابية</h3>
    <div class="numbers-grid">
        <div class="country-card"><div style="display:flex; align-items:center;"><span class="flag-icon">🇾🇪</span> اليمن</div><button class="activation-btn" onclick="triggerCode()">طلب كود</button></div>
        <div class="country-card"><div style="display:flex; align-items:center;"><span class="flag-icon">🇸🇾</span> سوريا</div><button class="activation-btn" onclick="triggerCode()">طلب كود</button></div>
        <div class="country-card"><div style="display:flex; align-items:center;"><span class="flag-icon">🇷🇺</span> روسيا</div><button class="activation-btn" onclick="triggerCode()">طلب كود</button></div>
        <div class="country-card"><div style="display:flex; align-items:center;"><span class="flag-icon">🇨🇳</span> الصين</div><button class="activation-btn" onclick="triggerCode()">طلب كود</button></div>
        <div class="country-card"><div style="display:flex; align-items:center;"><span class="flag-icon">🇳🇬</span> نيجيريا</div><button class="activation-btn" onclick="triggerCode()">طلب كود</button></div>
    </div>
</div>

<script>
    function toggleSidebar() {
        var sidebar = document.getElementById('sidebarMenu');
        var overlay = document.getElementById('menuOverlay');
        sidebar.classList.toggle('open');
        overlay.style.display = sidebar.classList.contains('open') ? 'block' : 'none';
    }
    function triggerCode() { alert("جاري تهيئة الاتصال بالسيرفر الدولي..."); }
</script>

</body>
</html>
